<h2>问题一：视觉风格倾向</h2>
<p class="subtitle">整体界面风格你偏好哪种？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>深色主题</h3>
      <p>暗色背景 + 柔和配色，适合长时间学习、夜间使用</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>浅色主题</h3>
      <p>白色背景 + 清爽配色，明亮干净</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>跟随系统 / 可切换</h3>
      <p>默认跟随系统，用户手动切换深色/浅色</p>
    </div>
  </div>
</div>

<hr style="border: none; border-top: 1px solid #313244; margin: 32px 0;">

<h2>问题二：知识库复习模式</h2>
<p class="subtitle">你之前说知识库既要回顾也要复习。复习模式你期望是怎样的？</p>

<div class="options">
  <div class="option" data-choice="d" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>卡片翻页</h3>
      <p>知识点以卡片形式展示，点击翻转查看详情，左右滑动切换下一张</p>
    </div>
  </div>
  <div class="option" data-choice="e" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>列表滚动</h3>
      <p>按日期/技能筛选的列表，滚动浏览，可搜索和过滤</p>
    </div>
  </div>
  <div class="option" data-choice="f" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>随机推送</h3>
      <p>首页或侧边栏随机展示一条历史知识点，碎片时间复习</p>
    </div>
  </div>
</div>
