<h2>打卡表单 —— 每天用最多次的交互</h2>
<p class="subtitle">必填：时长 + 关联子目标。可选：备注 + 学习心得 + 知识点</p>

<h3>方案 A — 紧凑单页</h3>
<div class="mockup" style="margin-bottom: 24px;">
  <div class="mockup-header">所有字段在一页，填完提交</div>
  <div class="mockup-body">
    <div style="background: #181825; padding: 20px; border-radius: 4px; max-width: 400px; margin: 0 auto;">
      <div style="font-weight: 600; color: #cdd6f4; margin-bottom: 16px;">React — 打卡</div>
      <div style="margin-bottom: 12px;">
        <div style="color: #a6adc8; font-size: 12px; margin-bottom: 4px;">日期</div>
        <input class="mock-input" placeholder="2026-05-08" style="width: 100%;">
      </div>
      <div style="margin-bottom: 12px;">
        <div style="color: #a6adc8; font-size: 12px; margin-bottom: 4px;">学习时长 *</div>
        <input class="mock-input" placeholder="2小时30分" style="width: 100%;">
      </div>
      <div style="margin-bottom: 12px;">
        <div style="color: #a6adc8; font-size: 12px; margin-bottom: 4px;">关联子目标</div>
        <input class="mock-input" placeholder="选择本月子目标..." style="width: 100%;">
      </div>
      <div style="margin-bottom: 12px;">
        <div style="color: #a6adc8; font-size: 12px; margin-bottom: 4px;">备注</div>
        <input class="mock-input" placeholder="链接、资源等" style="width: 100%;">
      </div>
      <div style="margin-bottom: 12px;">
        <div style="color: #a6adc8; font-size: 12px; margin-bottom: 4px;">学习心得</div>
        <textarea class="mock-input" placeholder="今天学到了什么..." style="width: 100%; height: 60px;"></textarea>
      </div>
      <div style="margin-bottom: 16px;">
        <div style="color: #a6adc8; font-size: 12px; margin-bottom: 4px;">知识点（加入知识库）</div>
        <textarea class="mock-input" placeholder="需要反复记忆的关键知识..." style="width: 100%; height: 40px;"></textarea>
      </div>
      <button class="mock-button" style="width: 100%;">提交打卡</button>
    </div>
  </div>
</div>

<h3>方案 B — 可折叠</h3>
<div class="mockup" style="margin-bottom: 24px;">
  <div class="mockup-header">必填项展开，选填项折叠，减少视觉负担</div>
  <div class="mockup-body">
    <div style="background: #181825; padding: 20px; border-radius: 4px; max-width: 400px; margin: 0 auto;">
      <div style="font-weight: 600; color: #cdd6f4; margin-bottom: 16px;">React — 打卡</div>
      <div style="margin-bottom: 12px;">
        <div style="color: #a6adc8; font-size: 12px; margin-bottom: 4px;">学习时长 *</div>
        <input class="mock-input" placeholder="2小时30分" style="width: 100%;">
      </div>
      <div style="margin-bottom: 12px;">
        <div style="color: #a6adc8; font-size: 12px; margin-bottom: 4px;">关联子目标 *</div>
        <input class="mock-input" placeholder="选择本月子目标..." style="width: 100%;">
      </div>
      <div style="padding: 8px 12px; background: #1e1e2e; border-radius: 6px; color: #a6adc8; font-size: 12px; cursor: pointer; margin-bottom: 8px;">
        + 添加备注
      </div>
      <div style="padding: 8px 12px; background: #1e1e2e; border-radius: 6px; color: #a6adc8; font-size: 12px; cursor: pointer; margin-bottom: 8px;">
        + 记录学习心得
      </div>
      <div style="padding: 8px 12px; background: #1e1e2e; border-radius: 6px; color: #a6adc8; font-size: 12px; cursor: pointer; margin-bottom: 16px;">
        + 新增知识点
      </div>
      <button class="mock-button" style="width: 100%;">提交打卡</button>
    </div>
  </div>
</div>

<h3>方案 C — 对话式</h3>
<div class="mockup">
  <div class="mockup-header">像聊天一样逐步填写，手机端友好</div>
  <div class="mockup-body">
    <div style="background: #181825; padding: 20px; border-radius: 4px; max-width: 400px; margin: 0 auto;">
      <div style="font-weight: 600; color: #cdd6f4; margin-bottom: 16px;">React — 打卡</div>
      <div style="margin-bottom: 12px; padding: 10px 14px; background: #313244; border-radius: 12px 12px 12px 4px; color: #cdd6f4; font-size: 13px;">
        今天学了多久？
      </div>
      <div style="margin-bottom: 16px; margin-left: 40px;">
        <input class="mock-input" placeholder="2小时30分" style="width: 100%;">
      </div>
      <div style="margin-bottom: 12px; padding: 10px 14px; background: #313244; border-radius: 12px 12px 12px 4px; color: #cdd6f4; font-size: 13px;">
        关联到哪个子目标？
      </div>
      <div style="margin-bottom: 16px; margin-left: 40px;">
        <input class="mock-input" placeholder="选择子目标..." style="width: 100%;">
      </div>
      <div style="margin-bottom: 12px; padding: 10px 14px; background: #313244; border-radius: 12px 12px 12px 4px; color: #cdd6f4; font-size: 13px;">
        有什么要备注的？（可跳过）
      </div>
      <div style="margin-left: 40px; margin-bottom: 16px;">
        <input class="mock-input" placeholder="写点什么..." style="width: 100%;">
      </div>
      <button class="mock-button" style="width: 100%;">完成</button>
    </div>
  </div>
</div>
